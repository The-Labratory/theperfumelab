name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Create zip archive
        run: |
          cd dist
          zip -r ../scentra-world-builder.zip .
          cd ..

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Scentra World Builder - Release ${{ steps.get_version.outputs.VERSION }}
            
            ### Download and Run
            
            **Web Version:**
            - Visit the [live app](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }})
            
            **Download Build:**
            1. Download `scentra-world-builder.zip` below
            2. Extract the zip file
            3. Open `index.html` in your web browser
            
            Or serve locally:
            ```bash
            # Using Python
            python -m http.server 8080
            
            # Using Node.js
            npx serve
            ```
            
            Then open http://localhost:8080 in your browser.
            
            ### Changes
            - Built from commit ${{ github.sha }}
          files: |
            scentra-world-builder.zip
          draft: false
          prerelease: false
